<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bride Aeoni</title>
  <meta name="description" content="Bride Aeoni links" />

  <style>
    :root{
      --maxw: 520px;          /* 전체 콘텐츠 최대 폭 */
      --padx: 18px;
      --btn-gap: 12px;        /* 버튼 간격 */
      --btn-width: 43%;       /* 버튼 폭 (대지 느낌 유지) */
      --btn-max: 120px;       /* 큰 화면에서 버튼 최대 폭 */
      --btn-radius: 18px;     /* 혹시 모를 라운드 (이미지라 영향 거의 없음) */
    }

    *{ box-sizing: border-box; }
    html, body { height: 100%; }
    body{
      margin: 0;
      font-family: system-ui, -apple-system, "Apple SD Gothic Neo", "Noto Sans KR",
                   "Pretendard", Segoe UI, Roboto, Arial, sans-serif;
      background: #000; /* BG 로딩 전 안전색 */
    }

    /* 배경 대지 */
    .page{
      min-height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px var(--padx);
      background-image: url("./assets/BG.png");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    /* 중앙 정렬 컨테이너 */
    .content{
      width: 100%;
      max-width: var(--maxw);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: var(--btn-gap);
      /* 대지 이미지의 버튼 위치가 아래로 내려가야 하면 여기 padding-top 조절 */
      padding-top: 22vh;
      padding-bottom: 6vh;
    }

    /* 버튼 공통 */
    .img-btn{
      width: min(var(--btn-width), var(--btn-max));
      display: block;
      border-radius: var(--btn-radius);
      overflow: hidden;
      text-decoration: none;
      transform: translateZ(0);
    }

    .img-btn img{
      width: 100%;
      height: auto;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
    }

    /* 살짝 고급스러운 인터랙션(원하면 제거 가능) */
    .img-btn{
      transition: transform .08s ease, filter .2s ease;
    }
    .img-btn:hover{
      filter: brightness(0.98);
    }
    .img-btn:active{
      transform: translateY(1px);
    }
    .img-btn:focus-visible{
      outline: 2px solid rgba(255,255,255,.65);
      outline-offset: 4px;
    }

    /* 작은 화면에서 버튼 위치 미세 조정 */
    @media (max-height: 740px){
      .content{ padding-top: 18vh; }
    }
    @media (max-height: 640px){
      .content{ padding-top: 14vh; }
    }

    /* 접근성: 스크린리더용 */
    .sr-only{
      position:absolute;
      width:1px;height:1px;
      padding:0;margin:-1px;
      overflow:hidden;clip:rect(0,0,0,0);
      white-space:nowrap;border:0;
    }
  </style>
</head>

<body>
  <main class="page">
    <section class="content" aria-label="Bride Aeoni links">
      <h1 class="sr-only">Bride Aeoni Links</h1>

      <!-- Button 1: 블로그 -->
      <a class="img-btn"
         href="https://m.blog.naver.com/kdw4514?tab=1"
         target="_blank" rel="noopener noreferrer"
         aria-label="브라이드 이오니 블로그 열기">
        <img src="./assets/button1.png" alt="브라이드 이오니 블로그" />
      </a>

      <!-- Button 2: 도에 인스타 -->
      <a class="img-btn"
         href="https://www.instagram.com/doe.makeup_"
         target="_blank" rel="noopener noreferrer"
         aria-label="메이크업 파트너 도에 인스타그램 열기">
        <img src="./assets/button2.png" alt="메이크업 파트너 도에" />
      </a>
    </section>
  </main>
</body>
</html>
